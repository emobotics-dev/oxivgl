# SPDX-License-Identifier: MIT OR Apache-2.0
# CI for oxivgl. Two parallel jobs:
#   host     — unit, doc, and integration tests on x86_64 (headless SDL2)
#   firmware — cross-compile example for xtensa-esp32-none-elf
#
# Both run inside ghcr.io/emobotics-dev/altreg-ci:latest on the self-hosted
# runner group (Xtensa toolchain, libclang, SDL2 pre-installed).

name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTUP_HOME: /opt/rustup
  CARGO_HOME: /opt/cargo
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  GIT_TERMINAL_PROMPT: "0"

permissions:
  contents: read
  packages: read

jobs:
  # ── Host tests ─────────────────────────────────────────────────────────
  host:
    name: Host tests
    runs-on:
      group: rust
      labels: [rust, esp32]
    container:
      image: ghcr.io/emobotics-dev/altreg-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Fix submodule URLs (relative → sibling-org HTTPS for CI)
        run: |
          git config --global credential.helper ""
          git config --global \
            url."https://github.com/emobotics-dev/".insteadOf \
            "https://github.com/emobotics-dev/oxivgl/"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Use system 64-bit libclang for host builds
        run: echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Unit tests
        run: cargo +nightly test --target x86_64-unknown-linux-gnu --lib

      - name: Doc tests
        run: cargo +nightly test --target x86_64-unknown-linux-gnu --doc

      - name: Integration tests (headless SDL2)
        run: |
          SDL_VIDEODRIVER=dummy cargo +nightly test --test integration \
            --target x86_64-unknown-linux-gnu -- --test-threads=1

      - name: Run all examples (headless screenshots)
        run: ./run_host.sh -s

      - name: Measure coverage (unit + integration)
        id: coverage
        run: |
          SDL_VIDEODRIVER=dummy cargo +nightly llvm-cov \
            --target x86_64-unknown-linux-gnu \
            --json --output-path coverage.json \
            -- --test-threads=1 --nocapture
          # Extract line coverage percentage
          PCT=$(python3 -c "
          import json, sys
          d = json.load(open('coverage.json'))
          t = d['data'][0]['totals']['lines']
          print(f\"{t['percent']:.0f}\")
          ")
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${PCT}%"

      - name: Update coverage badge
        if: github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: f92c7e4991559affa2788d3a66364bcc
          filename: oxivgl-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.pct }}%
          valColorRange: ${{ steps.coverage.outputs.pct }}
          minColorRange: 30
          maxColorRange: 80

  # ── ESP32 firmware ─────────────────────────────────────────────────────
  firmware:
    name: Build (ESP32)
    runs-on:
      group: rust
      labels: [rust, esp32]
    container:
      image: ghcr.io/emobotics-dev/altreg-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Fix submodule URLs (relative → sibling-org HTTPS for CI)
        run: |
          git config --global credential.helper ""
          git config --global \
            url."https://github.com/emobotics-dev/".insteadOf \
            "https://github.com/emobotics-dev/oxivgl/"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set ESP libclang + sysroot + PATH for firmware bindgen
        run: |
          ESP_LIBCLANG=$(cat /opt/esp_libclang_path)
          [ -n "$ESP_LIBCLANG" ] && echo "LIBCLANG_PATH=$ESP_LIBCLANG" >> "$GITHUB_ENV"
          ESP_SYSROOT=$(cat /opt/esp_sysroot_path)
          [ -n "$ESP_SYSROOT" ] && echo "BINDGEN_EXTRA_CLANG_ARGS=--sysroot=$ESP_SYSROOT" >> "$GITHUB_ENV"
          ESP_ELF_BIN=$(cat /opt/esp_elf_bin_path)
          [ -n "$ESP_ELF_BIN" ] && echo "$ESP_ELF_BIN" >> "$GITHUB_PATH"

      - name: Build example getting_started1 (ESP32)
        run: cargo +esp -Zbuild-std=alloc,core build --release --example getting_started1
